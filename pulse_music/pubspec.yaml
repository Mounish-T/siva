name: pulse_music
description: Pulse Music - a free, open-source music streaming app powered by Jamendo and Supabase.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Audio
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21

  # Networking
  dio: ^5.5.0+1

  # Backend / Auth
  supabase_flutter: ^2.5.6

  # UI / Images
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
